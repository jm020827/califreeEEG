seed: 42
run_name: debug
output_dir: outputs/debug
assets_config: configs/assets.yaml
data:
  processed_dirs: [data/processed/synthetic]
  split: cross_subject
  val_ratio: 0.2
  test_ratio: 0.2
  batch_size: 16
  num_workers: 0
model:
  n_classes: 4
  c_max: 64
  target_sfreq: 200
  t_len: 400
  d_model: 128
  patch_size: 20
  depth: 3
  n_heads: 4
  backbone:
    name: tiny_transformer
  condition_encoder:
    enabled: true
    n_prompt_tokens: 4
  adapter:
    enabled: true
    bottleneck_dim: 32
  latent:
    enabled: true
    z_dim: 16
    z_dropout: 0.5
train:
  epochs: 20
  lr: 0.0003
  weight_decay: 0.01
  amp: true
  grad_clip_norm: 1.0
  early_stop_patience: 10
loss:
  lambda_cons: 0.1
  lambda_logit_cons: 0.05
  beta_kl: 0.001
  ce_zero_weight: 0.5
augment:
  make_two_views: true
  channel_dropout_prob: 0.2
  min_channels: 4
  noise_std_range: [0.01, 0.05]
  time_shift_samples: 8
tracking:
  wandb:
    enabled: false
    project: calibration-free-eeg
    entity: null
    mode: online
    tags: [debug, synthetic]
    log_model: false
    watch_model: false
