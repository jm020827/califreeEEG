seed: 42
run_name: ssvep_pretrain
output_dir: outputs/ssvep_pretrain
assets_config: configs/assets.yaml
data:
  processed_dirs:
    - ${env:EEG_DATA_ROOT}/processed/wang_v1
    - ${env:EEG_DATA_ROOT}/processed/beta_v1
  split: cross_subject
  batch_size: 64
  num_workers: 4
model:
  n_classes: 40
  c_max: 64
  target_sfreq: 200
  t_len: 400
  d_model: 256
  patch_size: 20
  depth: 6
  n_heads: 8
  backbone:
    name: tiny_transformer
  condition_encoder:
    enabled: true
    n_prompt_tokens: 4
  adapter:
    enabled: true
    bottleneck_dim: 64
  latent:
    enabled: true
    z_dim: 16
train:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.01
  amp: true
  grad_clip_norm: 1.0
  early_stop_patience: 15
loss:
  lambda_cons: 0.1
  lambda_logit_cons: 0.05
  beta_kl: 0.001
  ce_zero_weight: 0.5
tracking:
  wandb:
    enabled: false
    project: calibration-free-eeg
    entity: null
    mode: online
    tags: [ssvep-pretrain]
    log_model: false
    watch_model: false
